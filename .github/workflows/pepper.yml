name: Pepper.pl Hot Deals → Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"  # every 15 minutes

concurrency:
  group: pepper-scraper-state
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure state file exists
        run: |
          mkdir -p data
          test -f data/seen_ids.json || echo '[]' > data/seen_ids.json

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE_FILE: "data/seen_ids.json"
          MIN_TEMPERATURE: "100"
          MAX_PAGES: "3"
        run: |
          python main.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # force-add even if .gitignore would normally exclude it
          git add -f data/seen_ids.json || true
          git diff --staged --quiet || git commit -m "chore: update seen_ids [skip ci]"

          # Resolve branch name (handles refs/heads/main or detached HEAD)
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "$GITHUB_REF" ]; then
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
          fi

          # Fetch latest remote to avoid non-fast-forward rejects
          git fetch origin "$BRANCH"

          # Try rebase; fallback to merge if rebase fails
          if git rebase --autostash "origin/$BRANCH"; then
            git push origin "$BRANCH"
          else
            git rebase --abort || true
            git pull --no-edit origin "$BRANCH" || true
            git push origin "$BRANCH"
          fi
